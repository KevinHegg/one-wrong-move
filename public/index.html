<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>One Wrong Move</title>
    <link rel="stylesheet" href="style.css">
    <script src="game.js" defer></script>
  </head>
  <body>
    <main class="phone-shell" aria-label="One Wrong Move">
      <section class="app-screen">
        <header class="app-header">
          <div>
            <p id="puzzleText" class="puzzle-number">Puzzle #---</p>
            <h1>One Wrong Move</h1>
          </div>
          <div class="timer-box" aria-live="polite">
            <span>Time</span>
            <strong id="timerText">0.0s</strong>
          </div>
        </header>

        <div class="status-bar">
          <span id="roundText">Ready</span>
          <span id="mistakeText">Mistakes 0</span>
        </div>

        <section class="rule-card" aria-labelledby="roundName">
          <p id="roundName" class="round-name">One board. One rule. One wrong move.</p>
          <h2 id="ruleText">Find the one move that breaks the rule.</h2>
          <p id="instructionText">Start today's puzzle and solve each board from the rule in front of you.</p>
        </section>

        <section id="feedbackPanel" class="feedback-panel" aria-live="polite" hidden>
          <strong id="feedbackTitle"></strong>
          <p id="feedbackText"></p>
        </section>

        <section id="gameArea" class="board-card is-idle" aria-label="Puzzle board">
          <div id="grid" class="grid" aria-disabled="true"></div>
        </section>

        <section id="resultPanel" class="result-panel" aria-label="Completed game summary" hidden>
          <div class="result-grid">
            <div>
              <span>Solved</span>
              <strong id="solvedText">3 of 3</strong>
            </div>
            <div>
              <span>Time</span>
              <strong id="finalTimeText">0.0s</strong>
            </div>
            <div>
              <span>Mistakes</span>
              <strong id="finalMistakeText">0</strong>
            </div>
            <div>
              <span>Score</span>
              <strong id="scoreText">1000</strong>
            </div>
          </div>
          <label class="share-label" for="sharePreview">Share text</label>
          <textarea id="sharePreview" class="share-preview" readonly></textarea>
        </section>

        <footer class="controls" aria-label="Game controls">
          <button id="startButton" class="primary-button" type="button">Start</button>
          <button id="shareButton" class="primary-button" type="button" hidden>Share result</button>
          <button id="restartButton" class="secondary-button" type="button" hidden>Restart</button>
        </footer>
      </section>
    </main>
  </body>
</html>
