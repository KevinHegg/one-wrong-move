<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>One Wrong Move Puzzle Lab</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="style.css?v=013">
    <script src="config.js?v=013" defer></script>
    <script src="symbols.js?v=013" defer></script>
    <script src="scoring.js?v=013" defer></script>
    <script src="puzzles.js?v=013" defer></script>
    <script src="lab.js?v=013" defer></script>
  </head>
  <body class="lab-page">
    <main class="lab-shell" aria-label="One Wrong Move puzzle lab">
      <header class="lab-header">
        <div>
          <p class="puzzle-number">Development lab</p>
          <h1>One Wrong Move Lab</h1>
        </div>
        <a href="index.html" class="lab-link">Game</a>
      </header>

      <section class="lab-controls" aria-label="Lab controls">
        <label>
          <span>Date / seed</span>
          <input id="labSeed" type="text" value="2026-05-02">
        </label>
        <label>
          <span>Session attempt</span>
          <input id="labAttempt" type="number" min="1" value="1">
        </label>
        <label>
          <span>Level limit</span>
          <input id="labLimit" type="number" min="15" max="180" value="60">
        </label>
        <label>
          <span>Filter</span>
          <select id="labFilter">
            <option value="">All puzzles</option>
            <option value="go">Go</option>
            <option value="othello">Othello</option>
            <option value="sudoku">Sudoku</option>
            <option value="minesweeper">Minesweeper</option>
            <option value="number">Number logic</option>
            <option value="multi">Multi-select</option>
          </select>
        </label>
        <button id="labRegenerate" class="primary-button" type="button">Regenerate</button>
      </section>

      <section id="labSurvival" class="lab-section" aria-label="Ladder stream preview"></section>
      <section id="labFreePlay" class="lab-section" aria-label="Free Play preview"></section>
      <section id="labSymbols" class="lab-section" aria-label="Symbol pack inventory"></section>
      <section id="labThemes" class="lab-section" aria-label="Theme pack inventory"></section>

      <section id="labList" class="lab-list" aria-live="polite"></section>
    </main>
  </body>
</html>
